name: Portfolio ML CI

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:

      matrix:

        python-version:

          - "3.12"

    steps:

    - name: Checkout code

      uses: actions/checkout@v4

    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version:

          ${{ matrix.python-version }}

    - name: Install dependencies

      run: |

        python -m pip install --upgrade pip

        pip install -r requirements.txt

    - name: Verify imports

      run: |

        python -c "

from data.data_loader import load_price_data

from models.train_pipeline import train_model

print('Imports OK')

"

    - name: Run training pipeline

      run: |

        python main.py

    - name: Verify artifacts

      run: |

        test -f output/final_dataset.csv

        test -f output/xgb_model.joblib

        test -f output/metrics.json

        echo 'Artifacts verified'

    - name: Run monitoring

      run: |

        python monitoring/prepare_monitoring.py

        python monitoring/drift.py
