name: Portfolio ML CI

on:

  push:

    branches:

      - master
      - main

  pull_request:

    branches:

      - master
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code

        uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r portfolio-ml/requirements.txt

      - name: Verify imports

        run: |

          python -c "print('Imports OK')"

      - name: Run training pipeline

        run: |

          python main.py

      - name: Verify artifacts

        run: |

          ls output

      - name: Run monitoring

        run: |

          python monitoring/prepare_monitoring.py || true

          python monitoring/drift.py || true
